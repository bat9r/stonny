<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your Dream with Stonny</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white; 
            background-color: #0D47A1;
        }
        .main-content {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .welcome-text {
            font-size: 1.8rem;
            max-width: 800px;
            margin: 0;
            line-height: 1.4;
            padding: 20px;
        }
        .welcome-text strong {
            color: #81D4FA; 
        }
        .footer {
            display: flex;
            justify-content: center;
            padding-bottom: 50px; 
        }
        .btn-dream {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #1976D2;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-dream:hover {
            background-color: #1565C0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1 class="welcome-text">Let <strong style="color:#FFF">stonfi</strong> build your dream. Connect with <strong style="color:#FFF">Stonny🐘</strong>, your reliable STON Support!</h1>
    </div>
    <div class="footer">
        <a href="/chat" class="btn-dream">Build your dream with Stonny</a>
    </div>
</body>
</html>
